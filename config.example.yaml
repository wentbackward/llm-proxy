server:
  host: "0.0.0.0"
  port: 4000
  api_key: "${PROXY_API_KEY}"     # clients must send: Authorization: Bearer <key>
  passthrough_unrouted: false    # false = reject unknown models with 404; true = forward to first backend
  # log_level: 1                 # 0=errors, 1=requests, 2=+headers, 3=+body preview, 4=+full message text
                                  # LOG_LEVEL env var overrides this when set
  tls:
    cert: ""   # path to TLS certificate (e.g. /certs/spark-01.ts.net.crt)
    key:  ""   # path to TLS private key  (e.g. /certs/spark-01.ts.net.key)
  transport:
    max_idle_conns: 100          # total idle connections across all backends
    max_idle_conns_per_host: 20  # idle connections kept per backend
    idle_conn_timeout: 120       # seconds before idle connections are closed

telemetry:
  prometheus:
    enabled: true
    port: 9091
    path: /metrics

journal:
  enabled: false
  otlp_endpoint: ""   # e.g. "http://otel-collector:4318"

# Full request/response capture, armed by SIGUSR1 for a bounded window.
# Disabled unless both enabled: true AND output_folder are set — there is no
# default folder, by design. Each captured request writes one JSON file with
# the incoming body, resolved body (as sent to backend), and response body.
# Headers like Authorization are redacted in the capture.
sig_message_capture:
  enabled: false
  output_folder: ""     # e.g. /var/log/llm-proxy/capture — REQUIRED when enabled
  max_messages: 5       # capture window size; re-armed on each SIGUSR1
  # Usage: docker kill --signal=USR1 llm-proxy
  #   → captures next max_messages requests, then auto-closes the window

# Upstream LLM providers
backends:
  - id: vllm-27b
    type: openai          # openai | anthropic
    base_url: "http://localhost:3022"
    api_key: "${VLLM_API_KEY}"  # omit or leave blank if no auth
    timeout_seconds: 300
    default: true         # target for passthrough_unrouted and /v1/models (at most one backend)

  - id: vllm-9b
    type: openai
    base_url: "http://localhost:3009"
    timeout_seconds: 120

  # Port expansion: generates vllm-worker-4000, vllm-worker-4001, vllm-worker-4002
  # - id: vllm-worker-{port}
  #   type: openai
  #   base_url: "http://127.0.0.1:{port}"
  #   ports: "4000-4002"            # range (inclusive)
  #   # also: ports: 4000           # single port
  #   # also: ports: [4000, 4005]   # explicit list

  - id: anthropic
    type: anthropic
    base_url: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout_seconds: 300
    skip_probe: true   # cloud APIs don't expose /v1/models

  - id: openai
    type: openai
    base_url: "https://api.openai.com"
    api_key: "${OPENAI_API_KEY}"
    timeout_seconds: 300
    max_concurrency: 5   # optional: limit in-flight requests to this backend (0 = unlimited)
    skip_probe: true

# Virtual model aliases with optional param profiles
# Omit routes entirely to run as a pure transparent proxy
routes:
  - virtual_model: gresh-flash
    backend: vllm-9b
    real_model: "Qwen/Qwen2.5-VL-7B-Instruct"
    context_length: 131072   # override inflated model-card value; 0 = pass through
    defaults:
      temperature: 0.7
      top_p: 0.95
      max_tokens: 4096
      enable_thinking: true
    clamp:
      enable_thinking: true   # caller cannot disable thinking

  - virtual_model: gresh-agent
    backend: vllm-27b
    real_model: "Qwen/Qwen2.5-VL-32B-Instruct"
    context_length: 131072
    defaults:
      temperature: 0.7
      top_p: 0.95
      max_tokens: 16384
      enable_thinking: true
    clamp:
      enable_thinking: true

  - virtual_model: gresh-vision
    backend: vllm-27b
    real_model: "Qwen/Qwen2.5-VL-32B-Instruct"
    context_length: 131072
    defaults:
      temperature: 0.3
      top_p: 0.9
      max_tokens: 8192
      enable_thinking: true
    clamp:
      enable_thinking: true

  - virtual_model: gresh-auto
    # No backend — auto-routes based on message content
    auto_route:
      text: gresh-flash
      vision: gresh-vision

  - virtual_model: claude-sonnet
    backend: anthropic
    real_model: "claude-sonnet-4-6"
    defaults:
      max_tokens: 8192
      enable_thinking: true
      thinking_budget: 8000
