name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: go build ./cmd/hikyaku

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint (default build)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: golangci-lint (hardened build)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --build-tags hardened

      - name: Build hardened
        run: go build -tags hardened ./cmd/hikyaku
