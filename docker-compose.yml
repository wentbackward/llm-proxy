services:
  llm-proxy:
    build: .
    # Or pull the prebuilt image instead of building locally:
    # image: ghcr.io/wentbackward/llm-proxy:latest
    container_name: llm-proxy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "200m"   # rotate container logs at 200 MB per file
        max-file: "5"      # keep up to 5 rotated files (1 GB total)
    ports:
      - "4000:4000"   # proxy
      - "9091:9091"   # prometheus metrics
    volumes:
      # Directory-level mount (NOT file-level) so editors that save atomically
      # — vim's writebackup, VS Code, etc. — don't orphan the container's
      # inode. Create ./config/config.yaml locally before first `up`.
      - ./config:/config:ro
      # Mount Tailscale certs for TLS (run: tailscale cert <hostname>)
      # - /var/lib/tailscale/certs:/certs:ro
    env_file:
      - .env
    environment:
      CONFIG_PATH: /config/config.yaml
      # Secrets — set these in a .env file or your secrets manager
      PROXY_API_KEY: ${PROXY_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-0}
    dns:
      - 100.100.100.100   # Tailscale MagicDNS
      - 8.8.8.8
